version: "3.9"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: medical_rag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Qdrant Vector Search Engine Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_medical_rag
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage

  # Redis Cache Service
  redis:
    image: redis:7
    container_name: redis_medical_rag
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# Named volumes for data persistence
volumes:
  postgres_data:
  qdrant_storage:
  redis_data:
