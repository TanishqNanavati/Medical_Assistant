version: "3.9"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: medical_rag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Qdrant Vector Search Engine Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_medical_rag
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage

  # Redis Cache Service
  redis:
    image: redis:7
    container_name: redis_medical_rag
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # RabbitMQ Broker for Celery
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_medical_rag
    restart: unless-stopped
    ports:
      - "5672:5672" # Message broker port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Main Application from Docker Hub
  app:
    image: tanishq/medical-assistant:latest
    container_name: medical_assistant_app
    restart: always
    ports:
      - "8000:8000"
      - "3000:3000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - postgres
      - qdrant
      - redis
      - rabbitmq

# Named volumes for data persistence
volumes:
  postgres_data:
  qdrant_storage:
  redis_data:
  rabbitmq_data:
